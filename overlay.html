<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stream Overlay - StreamOverlay Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #818cf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    color: white;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── OVERLAY CONTAINER ── */
  .overlay-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* ── SOURCE ITEMS ── */
  .source-item {
    position: absolute;
    overflow: hidden;
  }
  
  .source-item iframe,
  .source-item img,
  .source-item video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border: none;
  }
  
  .source-item .text-content {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── TRANSITION STYLES ── */
  .scene-container {
    position: absolute;
    inset: 0;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .scene-container.transition-fade {
    animation: transitionFade 0.6s ease;
  }
  
  .scene-container.transition-slide-left {
    animation: transitionSlideLeft 0.6s ease;
  }
  
  .scene-container.transition-slide-right {
    animation: transitionSlideRight 0.6s ease;
  }
  
  .scene-container.transition-slide-up {
    animation: transitionSlideUp 0.6s ease;
  }
  
  .scene-container.transition-slide-down {
    animation: transitionSlideDown 0.6s ease;
  }
  
  .scene-container.transition-zoom-in {
    animation: transitionZoomIn 0.6s ease;
  }
  
  .scene-container.transition-zoom-out {
    animation: transitionZoomOut 0.6s ease;
  }
  
  .scene-container.transition-flip-x {
    animation: transitionFlipX 0.6s ease;
  }
  
  .scene-container.transition-flip-y {
    animation: transitionFlipY 0.6s ease;
  }
  
  .scene-container.transition-cube-left {
    animation: transitionCubeLeft 0.8s ease;
  }
  
  .scene-container.transition-cube-right {
    animation: transitionCubeRight 0.8s ease;
  }
  
  .scene-container.transition-wipe-left {
    animation: transitionWipeLeft 0.6s ease;
  }
  
  .scene-container.transition-wipe-right {
    animation: transitionWipeRight 0.6s ease;
  }
  
  .scene-container.transition-wipe-up {
    animation: transitionWipeUp 0.6s ease;
  }
  
  .scene-container.transition-wipe-down {
    animation: transitionWipeDown 0.6s ease;
  }
  
  .scene-container.transition-rotate {
    animation: transitionRotate 0.7s ease;
  }
  
  .scene-container.transition-scale {
    animation: transitionScale 0.6s ease;
  }
  
  .scene-container.transition-blur {
    animation: transitionBlur 0.6s ease;
  }
  
  .scene-container.transition-pixelate {
    animation: transitionPixelate 0.6s ease;
  }
  
  .scene-container.transition-glitch {
    animation: transitionGlitch 0.5s ease;
  }
  
  .scene-container.transition-bounce {
    animation: transitionBounce 0.8s ease;
  }
  
  .scene-container.transition-elastic {
    animation: transitionElastic 0.8s ease;
  }
  
  .scene-container.transition-back {
    animation: transitionBack 0.6s ease;
  }

  /* Keyframes for transitions */
  @keyframes transitionFade {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  
  @keyframes transitionSlideLeft {
    0% { transform: translateX(100%); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  
  @keyframes transitionSlideRight {
    0% { transform: translateX(-100%); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  
  @keyframes transitionSlideUp {
    0% { transform: translateY(100%); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  
  @keyframes transitionSlideDown {
    0% { transform: translateY(-100%); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  
  @keyframes transitionZoomIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  
  @keyframes transitionZoomOut {
    0% { transform: scale(2); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  
  @keyframes transitionFlipX {
    0% { transform: perspective(400px) rotateX(90deg); opacity: 0; }
    100% { transform: perspective(400px) rotateX(0); opacity: 1; }
  }
  
  @keyframes transitionFlipY {
    0% { transform: perspective(400px) rotateY(90deg); opacity: 0; }
    100% { transform: perspective(400px) rotateY(0); opacity: 1; }
  }
  
  @keyframes transitionCubeLeft {
    0% { transform: perspective(1000px) rotateY(-90deg); opacity: 0; }
    50% { transform: perspective(1000px) rotateY(-45deg); opacity: 0.5; }
    100% { transform: perspective(1000px) rotateY(0); opacity: 1; }
  }
  
  @keyframes transitionCubeRight {
    0% { transform: perspective(1000px) rotateY(90deg); opacity: 0; }
    50% { transform: perspective(1000px) rotateY(45deg); opacity: 0.5; }
    100% { transform: perspective(1000px) rotateY(0); opacity: 1; }
  }
  
  @keyframes transitionWipeLeft {
    0% { clip-path: inset(0 100% 0 0); }
    100% { clip-path: inset(0 0 0 0); }
  }
  
  @keyframes transitionWipeRight {
    0% { clip-path: inset(0 0 0 100%); }
    100% { clip-path: inset(0 0 0 0); }
  }
  
  @keyframes transitionWipeUp {
    0% { clip-path: inset(100% 0 0 0); }
    100% { clip-path: inset(0 0 0 0); }
  }
  
  @keyframes transitionWipeDown {
    0% { clip-path: inset(0 0 100% 0); }
    100% { clip-path: inset(0 0 0 0); }
  }
  
  @keyframes transitionRotate {
    0% { transform: rotate(-180deg) scale(0); opacity: 0; }
    100% { transform: rotate(0) scale(1); opacity: 1; }
  }
  
  @keyframes transitionScale {
    0% { transform: scale(0.1); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  
  @keyframes transitionBlur {
    0% { filter: blur(50px); opacity: 0; }
    100% { filter: blur(0); opacity: 1; }
  }
  
  @keyframes transitionPixelate {
    0% { filter: blur(20px); transform: scale(1.5); opacity: 0; }
    50% { filter: blur(10px); }
    100% { filter: blur(0); transform: scale(1); opacity: 1; }
  }
  
  @keyframes transitionGlitch {
    0% { transform: translate(0); filter: hue-rotate(0deg); }
    20% { transform: translate(-5px, 5px); filter: hue-rotate(90deg); }
    40% { transform: translate(5px, -5px); filter: hue-rotate(180deg); }
    60% { transform: translate(-5px, -5px); filter: hue-rotate(270deg); }
    80% { transform: translate(5px, 5px); filter: hue-rotate(360deg); }
    100% { transform: translate(0); filter: hue-rotate(0deg); }
  }
  
  @keyframes transitionBounce {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.1); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }
  
  @keyframes transitionElastic {
    0% { transform: scale(0); opacity: 0; }
    40% { transform: scale(1.1); }
    60% { transform: scale(0.95); }
    80% { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }
  
  @keyframes transitionBack {
    0% { transform: scale(0.5) translateZ(-500px); opacity: 0; }
    50% { transform: scale(1.1) translateZ(100px); }
    100% { transform: scale(1) translateZ(0); opacity: 1; }
  }

  /* ── TEXT ANIMATIONS ── */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
</style>
</head>
<body>

<div class="overlay-container" id="overlayContainer">
  <!-- Sources will be rendered here -->
</div>

<script>
// ──────────────────────────────────────────
// FIREBASE CONFIGURATION
// ──────────────────────────────────────────
const firebaseConfig = {
  databaseURL: "https://spin-c7801-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// ──────────────────────────────────────────
// STATE
// ──────────────────────────────────────────
let scenes = [];
let activeSceneId = null;
let currentTransition = 'fade';
let lastSceneId = null;

// ──────────────────────────────────────────
// INITIALIZATION
// ──────────────────────────────────────────
function init() {
  // Load transition
  database.ref('stream/transition').on('value', (snapshot) => {
    const transition = snapshot.val();
    if (transition) {
      currentTransition = transition;
    }
  });

  // Load scenes
  database.ref('stream/scenes').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      scenes = Object.entries(data).map(([id, scene]) => ({ id, ...scene }));
      renderOverlay();
    }
  });

  // Load active scene
  database.ref('stream/activeScene').on('value', (snapshot) => {
    const newSceneId = snapshot.val();
    if (newSceneId !== activeSceneId) {
      lastSceneId = activeSceneId;
      activeSceneId = newSceneId;
      renderOverlay();
    }
  });
}

// ──────────────────────────────────────────
// RENDER OVERLAY
// ──────────────────────────────────────────
function renderOverlay() {
  const container = document.getElementById('overlayContainer');
  const activeScene = scenes.find(s => s.id === activeSceneId);
  
  if (!activeScene || !activeScene.sources || activeScene.sources.length === 0) {
    container.innerHTML = '';
    return;
  }
  
  const visibleSources = activeScene.sources.filter(s => !s.hidden);
  
  if (visibleSources.length === 0) {
    container.innerHTML = '';
    return;
  }
  
  // Apply transition class if scene changed
  const transitionClass = lastSceneId && lastSceneId !== activeSceneId ? `transition-${currentTransition}` : '';
  
  container.innerHTML = `
    <div class="scene-container ${transitionClass}">
      ${visibleSources.map(source => `
        <div class="source-item" 
             style="left: ${source.x}%; top: ${source.y}%; width: ${source.width}%; height: ${source.height}%;">
          ${renderSourceContent(source)}
        </div>
      `).join('')}
    </div>
  `;
}

function renderSourceContent(source) {
  switch(source.type) {
    case 'youtube':
      const videoId = extractYouTubeId(source.url);
      if (!videoId) return '';
      // YouTube clean - no title, controls, etc
      return `<iframe 
        src="https://www.youtube.com/embed/${videoId}?autoplay=${source.autoplay ? 1 : 0}&mute=${source.muted ? 1 : 0}&loop=${source.loop ? 1 : 0}&playlist=${videoId}&controls=0&showinfo=0&modestbranding=1&rel=0&iv_load_policy=3&fs=0" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>`;
      
    case 'rtsp':
      return `<video 
        src="${source.url}" 
        autoplay muted playsinline
        style="width: 100%; height: 100%; object-fit: contain; background: #000;">
      </video>`;
      
    case 'gif':
      return `<img src="${source.url}" alt="${source.name}" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.style.display='none'">`;
      
    case 'image':
      return `<img src="${source.url}" alt="${source.name}" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.style.display='none'">`;
      
    case 'text':
      const textStyles = [];
      textStyles.push(`font-size: ${source.fontSize || 32}px`);
      textStyles.push(`color: ${source.color || '#ffffff'}`);
      textStyles.push(`background: ${source.bgColor || 'transparent'}`);
      if (source.bold) textStyles.push('font-weight: bold');
      if (source.shadow) textStyles.push('text-shadow: 2px 2px 4px rgba(0,0,0,0.8)');
      
      let textContent = source.text || '';
      
      switch(source.textType) {
        case 'scrolling':
          return `<div class="text-content" style="${textStyles.join(';')}; white-space: nowrap; overflow: hidden;">
            <marquee behavior="scroll" direction="left" scrollamount="5">${textContent}</marquee>
          </div>`;
        case 'blink':
          textStyles.push('animation: blink 1s infinite');
          break;
        case 'glow':
          textStyles.push(`text-shadow: 0 0 10px ${source.color}, 0 0 20px ${source.color}, 0 0 30px ${source.color}`);
          break;
        case 'rainbow':
          textStyles.push('background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3)');
          textStyles.push('-webkit-background-clip: text');
          textStyles.push('-webkit-text-fill-color: transparent');
          textStyles.push('background-size: 200% auto');
          textStyles.push('animation: rainbow 3s linear infinite');
          break;
      }
      
      return `<div class="text-content ${source.textType}" style="${textStyles.join(';')}; display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px;">${textContent}</div>`;
      
    default:
      return '';
  }
}

function extractYouTubeId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/
  ];
  for (let pattern of patterns) {
    const match = url.match(pattern);
    if (match) return match[1];
  }
  return null;
}

// Init
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
